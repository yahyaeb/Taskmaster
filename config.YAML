programs:
  myprogram:
    cmd: "/workspace/a.out"
    numprocs: 1
    umask: 022
    workingdir: /tmp
    autostart: true
    autorestart: unexpected
    exitcodes:
      - 0
    startretries: 3
    starttime: 5
    stopsignal: TERM
    stoptime: 10
    stdout: /tmp/myprogram.stdout
    stderr: /tmp/myprogram.stderr
    env:
      STARTED_BY: taskmaster
  
  myprogram2:
    cmd: "/workspace/anotherOne.out"
